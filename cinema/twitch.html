<html>
<input style="position:absolute;opacity:0;"></input>
<body style="margin:0px;background-color:black;overflow:hidden;">
	<div id="player" style="width:100%;height:200%;position:absolute;top:-50%;"></div>
</body>
<link rel="preconnect" href="https://player.twitch.tv" crossorigin>
<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script type="text/javascript">
	const urlParams = new URLSearchParams(window.location.search);
	var key = urlParams.get("v");

	const trapInput = document.querySelector("input");
	setInterval(function(){if(player_ready)trapInput.focus()}, 10); // required to recapture key inputs for onkeydown

	var player_ready = false;
	var volume = parseFloat(urlParams.get("vol"));
	var seek = parseFloat(urlParams.get("seek"));
	var duration;
	var player;
	var time;
	var current_time = () => (Date.now()/1000 - time);

	var json = new Object();
	function think(){
		if (player_ready){
			player.getQualities().forEach(function(quality){
				if (quality.name.includes("source")){
					player.setQuality(quality.name);
				}
			});
			player.setVolume(volume/100);
			if (volume > 0) player.setMuted(false);

			if (time){
				if (!player.getPlayerState().ended){
					if (Math.abs(player.getCurrentTime() - current_time()) > 2){
						player.seek(current_time());
					}
				}

				json.buffered = (player.getCurrentTime() + player.getPlaybackStats().bufferSize) / player.getDuration();
				document.title = JSON.stringify(json);
			}
		}
	}
	setInterval(think, 200);
			
	window.onkeydown = function(e){
		var code = e.keyCode ? e.keyCode : e.which;

		if (code >= 240 && code <= 340){ // 0xF0
			volume = code - 240;
		}
	};

	window.onwheel = function(e){
		seek = Math.round(e.wheelDelta * .6)/100; // weird error of 166.66%
		time -= seek - current_time();
		json.buffered = 0;
		document.title = JSON.stringify(json);
		player.seek(current_time());
	};

	if (key.startsWith("videos/")){
		player = new Twitch.Player("player", {video: key.split("/")[1], autoplay: true, muted: true, parent: [window.location.hostname]});
		player.seek(seek);
		time = Date.now()/1000 - seek;
	}
	else player = new Twitch.Player("player", {channel: key, autoplay: true, muted: true, parent: [window.location.hostname]});
	player._iframe.style.width = "100%";
	player._iframe.style.height = "100%";

	player.addEventListener(Twitch.Player.PLAYING, function(){
		player_ready = true;
	});
</script>
</html>
